<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=analisis-de-mercado.html">
<title>Monitor de Precios Agrícolas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .logo { font-size: 48px; }
  h1 { font-size: 22px; font-weight: 700; color: #fff; }
  p { font-size: 14px; color: #718096; }
  a {
    margin-top: 8px;
    color: #3ecf8e;
    font-size: 14px;
    text-decoration: none;
    border: 1px solid #3ecf8e;
    padding: 10px 24px;
    border-radius: 8px;
    transition: background .2s;
  }
  a:hover { background: rgba(62,207,142,0.12); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #2d3748;
    border-top-color: #3ecf8e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="logo">🌿</div>
  <h1>Monitor de Precios Agrícolas</h1>
  <p>Redirigiendo al dashboard...</p>
  <div class="spinner"></div>
  <a href="analisis-de-mercado.html">Abrir dashboard →</a>
</body>
</html>
